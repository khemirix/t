<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10; --surface: #0e1419; --border: #1c2530;
    --accent: #00e5ff; --accent2: #ff3d71; --text: #c8d6e5;
    --muted: #4a5568; --green: #00ff88;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 32px 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(255,61,113,0.05) 0%, transparent 60%);
  }
  header { width: 100%; max-width: 900px; display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
  .logo {
    width: 38px; height: 38px; background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo svg { width: 18px; height: 18px; fill: #080c10; }
  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
  h1 span { color: var(--accent); }
  .badge {
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.25);
    color: var(--accent); padding: 3px 8px; border-radius: 3px;
    letter-spacing: 0.08em; margin-left: auto;
  }
  .main { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 16px; }

.input-card { background: var(–surface); border: 1px solid var(–border); border-radius: 10px; padding: 20px; }
.input-label { font-size: 0.7rem; font-family: ‘Space Mono’, monospace; letter-spacing: 0.12em; color: var(–muted); text-transform: uppercase; margin-bottom: 10px; }
.input-row { display: flex; gap: 10px; margin-bottom: 10px; }

input[type=“text”] {
flex: 1; background: var(–bg); border: 1px solid var(–border);
border-radius: 6px; color: var(–text); font-family: ‘Space Mono’, monospace;
font-size: 0.8rem; padding: 12px 14px; outline: none; transition: border-color 0.2s;
}
input[type=“text”]:focus { border-color: var(–accent); box-shadow: 0 0 0 2px rgba(0,229,255,0.08); }
input[type=“text”]::placeholder { color: var(–muted); }

.btn-play {
background: var(–accent); color: #080c10; border: none; border-radius: 6px;
font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: 0.85rem;
padding: 12px 22px; cursor: pointer; transition: background 0.2s, transform 0.1s;
white-space: nowrap;
}
.btn-play:hover { background: #33ecff; }
.btn-play:active { transform: scale(0.97); }

.proxy-info {
font-family: ‘Space Mono’, monospace; font-size: 0.68rem;
color: var(–muted); background: rgba(0,229,255,0.04);
border: 1px solid rgba(0,229,255,0.1); border-radius: 6px;
padding: 10px 14px; line-height: 1.8;
}
.proxy-info span { color: var(–accent); }

.player-card { background: var(–surface); border: 1px solid var(–border); border-radius: 10px; overflow: hidden; }
.player-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(–border); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(–muted); }
.dot.live { background: var(–accent2); box-shadow: 0 0 6px var(–accent2); animation: blink 1.4s ease-in-out infinite; }
.dot.ok { background: var(–green); box-shadow: 0 0 6px var(–green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.player-title { font-family: ‘Space Mono’, monospace; font-size: 0.72rem; color: var(–muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-title.active { color: var(–text); }

.status-tag { font-family: ‘Space Mono’, monospace; font-size: 0.6rem; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.08em; }
.status-tag.idle { background: rgba(74,85,104,0.3); color: var(–muted); }
.status-tag.loading { background: rgba(0,229,255,0.1); color: var(–accent); }
.status-tag.playing { background: rgba(0,255,136,0.1); color: var(–green); }
.status-tag.error { background: rgba(255,61,113,0.1); color: var(–accent2); }

.video-wrapper { position: relative; background: #000; aspect-ratio: 16/9; }
video { width: 100%; height: 100%; display: block; }

.video-overlay {
position: absolute; inset: 0; display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 12px;
background: rgba(8,12,16,0.85); transition: opacity 0.3s;
}
.video-overlay.hidden { opacity: 0; pointer-events: none; }
.overlay-icon { width: 56px; height: 56px; border: 2px solid var(–border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(–muted); }
.overlay-text { font-family: ‘Space Mono’, monospace; font-size: 0.75rem; color: var(–muted); text-align: center; }
.spinner { width: 36px; height: 36px; border: 2px solid var(–border); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.log-card { background: var(–surface); border: 1px solid var(–border); border-radius: 10px; overflow: hidden; }
.log-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(–border); }
.log-title { font-family: ‘Space Mono’, monospace; font-size: 0.68rem; color: var(–muted); letter-spacing: 0.1em; text-transform: uppercase; }
.btn-clear { background: none; border: none; font-family: ‘Space Mono’, monospace; font-size: 0.62rem; color: var(–muted); cursor: pointer; }
.btn-clear:hover { color: var(–accent2); }
.log-body { padding: 12px 16px; max-height: 140px; overflow-y: auto; font-family: ‘Space Mono’, monospace; font-size: 0.7rem; line-height: 1.7; }
.log-body::-webkit-scrollbar { width: 4px; }
.log-body::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }
.log-line { color: var(–muted); }
.log-line.info { color: var(–text); }
.log-line.success { color: var(–green); }
.log-line.warn { color: #ffd700; }
.log-line.error { color: var(–accent2); }
.log-time { color: var(–muted); margin-right: 8px; }
</style>

</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  <h1>IPTV <span>Player</span></h1>
  <span class="badge">PROXY MODE</span>
</header>

<div class="main">

  <div class="input-card">
    <div class="input-label">Channel ID</div>
    <div class="input-row">
      <input type="text" id="channelInput" placeholder="e.g. 18776 or 18776.m3u8" />
      <button class="btn-play" onclick="loadStream()">▶ Play</button>
    </div>
    <div class="proxy-info">
      Proxy: <span id="proxyDisplay"></span><br>
      Stream: <span id="streamDisplay">—</span>
    </div>
  </div>

  <div class="player-card">
    <div class="player-header">
      <div class="dot" id="statusDot"></div>
      <div class="player-title" id="playerTitle">No stream loaded</div>
      <span class="status-tag idle" id="statusTag">IDLE</span>
    </div>
    <div class="video-wrapper">
      <video id="video" controls playsinline></video>
      <div class="video-overlay" id="overlay">
        <div class="overlay-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="overlay-text">Enter a channel ID above<br>and press Play</div>
      </div>
    </div>
  </div>

  <div class="log-card">
    <div class="log-header">
      <span class="log-title">Console</span>
      <button class="btn-clear" onclick="clearLog()">clear</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

</div>

<script>
  // ─── CONFIG — change this to your deployed proxy URL ───
  const PROXY = 'https://t-ahg3.onrender.com/';
  // ────────────────────────────────────────────────────────

  document.getElementById('proxyDisplay').textContent = PROXY;

  let hls = null;

  function log(msg, type = 'info') {
    const body = document.getElementById('logBody');
    const now = new Date().toTimeString().slice(0,8);
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.innerHTML = `<span class="log-time">[${now}]</span>${msg}`;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  }

  function clearLog() { document.getElementById('logBody').innerHTML = ''; }

  function setStatus(state) {
    const dot = document.getElementById('statusDot');
    const tag = document.getElementById('statusTag');
    dot.className = 'dot';
    tag.className = 'status-tag';
    const map = {
      loading: ['live', 'loading', 'LOADING'],
      playing: ['ok',   'playing', 'LIVE'],
      error:   ['',     'error',   'ERROR'],
      idle:    ['',     'idle',    'IDLE'],
    };
    const [dc, tc, txt] = map[state] || map.idle;
    if (dc) dot.classList.add(dc);
    tag.classList.add(tc);
    tag.textContent = txt;
  }

  function showOverlay(show, loading = false) {
    const ov = document.getElementById('overlay');
    if (!show) { ov.classList.add('hidden'); return; }
    ov.classList.remove('hidden');
    ov.innerHTML = loading
      ? `<div class="spinner"></div><div class="overlay-text">Connecting via proxy…</div>`
      : `<div class="overlay-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div><div class="overlay-text">Enter a channel ID above<br>and press Play</div>`;
  }

  function destroyHls() { if (hls) { hls.destroy(); hls = null; } }

  function loadStream() {
    let channelId = document.getElementById('channelInput').value.trim();
    if (!channelId) { log('No channel ID entered.', 'warn'); return; }

    // Build proxy URL — try .m3u8 first for HLS
    const hasExt = /\.(m3u8|ts)$/.test(channelId);
    const m3u8Id = hasExt ? channelId : channelId + '.m3u8';
    const proxyUrl = `${PROXY}/stream/${m3u8Id}`;

    document.getElementById('streamDisplay').textContent = proxyUrl;
    document.getElementById('playerTitle').textContent = `Channel: ${channelId}`;
    document.getElementById('playerTitle').classList.add('active');

    destroyHls();
    setStatus('loading');
    showOverlay(true, true);
    log(`Requesting: ${proxyUrl}`, 'info');

    const video = document.getElementById('video');

    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, lowLatencyMode: true, backBufferLength: 30 });

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        log('Manifest OK — starting playback.', 'success');
        video.play().catch(e => log(`Autoplay blocked: ${e.message}`, 'warn'));
      });

      hls.on(Hls.Events.LEVEL_LOADED, (e, data) => {
        log(`Stream type: ${data.details.live ? 'LIVE' : 'VOD'}`, 'success');
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          log(`HLS error: ${data.details} — retrying as raw TS...`, 'warn');
          destroyHls();
          // Fallback: try without .m3u8 (raw TS)
          const rawUrl = `${PROXY}/stream/${channelId.replace(/\.m3u8$/, '')}`;
          log(`Trying: ${rawUrl}`, 'info');
          video.src = rawUrl;
          bindVideoEvents(video);
        }
      });

      hls.loadSource(proxyUrl);
      hls.attachMedia(video);

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = proxyUrl;
    } else {
      video.src = proxyUrl;
    }

    bindVideoEvents(video);
  }

  function bindVideoEvents(video) {
    video.onplaying = () => { setStatus('playing'); showOverlay(false); log('Playback started.', 'success'); };
    video.onwaiting = () => log('Buffering…', 'warn');
    video.onerror   = () => { setStatus('error'); log('Playback error. Check channel ID or proxy.', 'error'); };
  }

  document.getElementById('channelInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadStream();
  });

  log('Player ready. Proxy mode active.', 'success');
  showOverlay(true);
</script>

</body>
</html>
